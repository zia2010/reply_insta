<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Reply Assist — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #262626;
      background: #fafafa;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      color: #fff;
      padding: 20px 24px;
      text-align: center;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 12px; opacity: 0.85; margin-top: 4px; }

    /* Form */
    .form-body {
      padding: 16px 20px 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8e8e8e;
      margin-bottom: 4px;
    }

    label .hint {
      text-transform: none;
      font-weight: 400;
      color: #b0b0b0;
    }

    input[type="text"],
    input[type="password"],
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dbdbdb;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      color: #262626;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #833ab4;
      box-shadow: 0 0 0 2px rgba(131, 58, 180, 0.12);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #833ab4, #c13584);
      color: #fff;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #6e2fa0, #a82d70); }

    .btn-secondary {
      background: #efefef;
      color: #262626;
    }
    .btn-secondary:hover { background: #dbdbdb; }

    /* Status Bar */
    .status {
      padding: 10px 20px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .status.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .status.error { display: block; background: #fce4ec; color: #c62828; }
    .status.info { display: block; background: #e3f2fd; color: #1565c0; }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid #efefef;
      margin: 16px 0;
    }

    /* API key section */
    .api-key-row {
      display: flex;
      gap: 8px;
    }
    .api-key-row input { flex: 1; }
    .api-key-row .btn { flex: 0 0 auto; padding: 10px 14px; font-size: 12px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>💬 Reply Assist Settings</h1>
    <p>Configure your brand knowledge base &amp; API key</p>
  </div>

  <div id="status" class="status"></div>

  <div class="form-body">
    <!-- API Key -->
    <div class="field">
      <label>Anthropic API Key</label>
      <div class="api-key-row">
        <input type="password" id="apiKey" placeholder="sk-ant-…">
        <button class="btn btn-secondary" id="testKeyBtn">Test</button>
      </div>
    </div>

    <hr class="divider">

    <!-- Brand Name -->
    <div class="field">
      <label>Brand Name</label>
      <input type="text" id="brandName" placeholder="e.g. GlowSkin Cosmetics">
    </div>

    <!-- Products -->
    <div class="field">
      <label>Product Catalogue <span class="hint">(name, price, variants — one per line)</span></label>
      <textarea id="productCatalogue" rows="5" placeholder="Vitamin C Serum — $29.99 — 30ml / 60ml&#10;Hyaluronic Moisturizer — $34.99 — All skin types"></textarea>
    </div>

    <!-- Return Policy -->
    <div class="field">
      <label>Return Policy</label>
      <textarea id="returnPolicy" rows="3" placeholder="30-day returns on unopened items. Refund within 5 business days."></textarea>
    </div>

    <!-- Shipping Info -->
    <div class="field">
      <label>Shipping Info</label>
      <textarea id="shippingInfo" rows="3" placeholder="Free shipping over $50. Standard 3-5 days. Express 1-2 days ($9.99)."></textarea>
    </div>

    <!-- Tone -->
    <div class="field">
      <label>Brand Tone</label>
      <select id="toneStyle">
        <option value="casual">Casual & Friendly</option>
        <option value="professional">Professional</option>
        <option value="friendly-formal">Friendly but Formal</option>
      </select>
    </div>

    <div class="field">
      <label>Tone Guide <span class="hint">(extra style notes, emoji rules, sign-off)</span></label>
      <textarea id="toneGuide" rows="3" placeholder="Use 1-2 emojis per reply. Sign off with 'xo, [Brand]'. Never use slang."></textarea>
    </div>

    <!-- Escalation Keywords -->
    <div class="field">
      <label>Escalation Keywords <span class="hint">(comma-separated)</span></label>
      <input type="text" id="escalationKeywords" placeholder="refund, legal, lawyer, wrong order, damaged, scam">
    </div>

    <!-- Example Replies -->
    <div class="field">
      <label>Example Replies <span class="hint">(paste examples of ideal brand replies)</span></label>
      <textarea id="exampleReplies" rows="4" placeholder="Customer: Is this vegan?&#10;Brand: Hey! Yes, all our products are 100% vegan & cruelty-free 🌱"></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" id="resetBtn">Reset</button>
      <button class="btn btn-primary" id="saveBtn">💾 Save Settings</button>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
